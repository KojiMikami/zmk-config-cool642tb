include:
  # 左手側のビルド設定
  - board: xiao_ble
    shield: cool642tb_L
    extra-modules: [zmk-rgbled-widget]

  # 右手側のビルド設定（ZMK Studio対応）
  - board: xiao_ble
    shield: cool642tb_R
    snippet: studio-rpc-usb-uart
    extra-modules: [zmk-rgbled-widget]
    cmake-args: -DCONFIG_ZMK_STUDIO=y

  # 設定リセット用のビルド設定
  - board: xiao_ble
    shield: settings_reset
